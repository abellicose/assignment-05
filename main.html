<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="./src/main.css">
    <title>Assignment-05</title>
</head>
<body>
    <header id="header">
        <div class="header-container">
            <div class="logo-container">
                <img src="./assets/github-logo.png" alt="github logo">
                <h1>Github Issues Tracker</h1>
            </div>
            <form id="search">
                <input type="search" id="search-input" placeholder="Search issues...">
                <button type="submit">Search</button>
            </form>
        </div>
    </header>
    <main>
        <section id="tab">
            <div id="tablist">
                <button aria-selected="true" data-filter="all">All</button>
                <button aria-selected="false" data-filter="open">Open</button>
                <button aria-selected="false" data-filter="closed">Closed</button>
            </div>

            <div class="tab-data">
                <div class="tracker">
                    <div class="data">
                        <img src="./assets/aperture.png" alt="aperture">
                        <div class="values">
                            <data value="50">50 Issues</data>
                            <p>Track and manage all your project issues</p>
                        </div>
                    </div>
                    <ul class="status-counts">
                        <li>
                            <span class="dot open"></span>
                            <span>Open</span>
                        </li>
                        <li>
                            <span class="dot closed"></span>
                            <span>Closed</span>
                        </li>
                    </ul>
                </div>

                <div id="tabpanel">
                    <ul id="card-list">
                        <li><div class="loader"></div></li>
                    </ul>
                </div>

                <dialog id="modal">
                </dialog>
            </div>
        </section>
    </main>

    <script src="./src/main.js"></script>
</body>
</html>
